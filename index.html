<!DOCTYPE html>
<html lang="en">
<head>

            text-align: center;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 0;
        }

        main {

        }
        footer {

            color: #fff;

        }
        .social-links a {

            <div class="social-links">
                <a href="https://github.com/your-username" target="_blank">GitHub</a>
